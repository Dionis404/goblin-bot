services:
  goblin-bot:
    build: .
    image: goblin-bot:latest        
    container_name: goblin-bot
    command: python -m bot.main
    restart: unless-stopped
    env_file: .env
    networks:
      - shared-net
    dns:                            =
      - 8.8.8.8
      - 1.1.1.1

  goblin-api:
    build: .
    image: goblin-bot:latest
    container_name: goblin-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env
    networks:
      - shared-net
    dns:
      - 8.8.8.8
      - 1.1.1.1


networks:
  shared-net:
    external: true
